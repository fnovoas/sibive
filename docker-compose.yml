version: "3.9"

services:

  geth:
    build: ./geth-node
    ports:
      - "8545:8545"
    volumes:
      - ./geth-node/data:/geth/data

  backend:
    build: ./sibive-backend
    ports:
      - "5000:5000"
    depends_on:
      - geth

  frontend:
    build: ./sibive-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

      